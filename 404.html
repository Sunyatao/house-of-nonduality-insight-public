(() => {
  const STORAGE_KEY = "contentLanguage";

  const getStoredLanguage = () => {
    try {
      return localStorage.getItem(STORAGE_KEY);
    } catch {
      return null;
    }
  };

  const setStoredLanguage = (lang) => {
    try {
      localStorage.setItem(STORAGE_KEY, lang);
    } catch {}
  };

  const getLanguageFromHref = (href) => {
    if (!href) return null;

    const hashIndex = href.indexOf("#");
    if (hashIndex === -1) return null;

    const hash = href.slice(hashIndex).toLowerCase();

    if (hash === "#lang-original" || hash === "#original") return "original";
    if (hash === "#lang-nederlands" || hash === "#nederlands") return "nl";
    if (hash === "#lang-english" || hash === "#english") return "en";

    return null;
  };

  const getLanguageFromLink = (link) => {
    const hrefLang = getLanguageFromHref(link.getAttribute("href"));
    if (hrefLang) return hrefLang;

    const text = (link.textContent || "").trim().toLowerCase();

    if (text === "original") return "original";
    if (text === "nederlands") return "nl";
    if (text === "english") return "en";

    return null;
  };

  const getLanguageHeading = (article, lang) => {
    if (lang === "original") return article.querySelector("h2#original, h2#lang-original");
    if (lang === "nl") return article.querySelector("h2#nederlands, h2#lang-nederlands");
    if (lang === "en") return article.querySelector("h2#english, h2#lang-english");
    return null;
  };

  const getAvailableLanguages = (article) => {
    const available = [];

    if (getLanguageHeading(article, "original")) available.push("original");
    if (getLanguageHeading(article, "en")) available.push("en");
    if (getLanguageHeading(article, "nl")) available.push("nl");

    return available;
  };

  const chooseLanguage = (article) => {
    const available = getAvailableLanguages(article);
    const stored = getStoredLanguage();

    if (stored && available.includes(stored)) return stored;
    if (available.includes("en")) return "en";
    if (available.includes("nl")) return "nl";
    if (available.includes("original")) return "original";

    return null;
  };

  const updateActiveLinks = (article, lang) => {
    article.querySelectorAll("a").forEach((link) => {
      const linkLang = getLanguageFromLink(link);
      if (!linkLang) return;

      link.classList.toggle("active", linkLang === lang);
    });
  };

  const initVisualPoems = () => {
    const isPoemFrontmatter = false;
    const isPoemsAndQuotesPage = false;

    const articles = document.querySelectorAll("article");

    articles.forEach((article) => {
      const hasLanguageToggle = article.querySelector(
        'a[href*="#lang-english"], a[href*="#lang-nederlands"], a[href*="#lang-original"]'
      );

      const hasImage = article.querySelector(".markdown-preview-view > p:first-child img");

      if (!hasImage || (!hasLanguageToggle && !isPoemFrontmatter && !isPoemsAndQuotesPage)) {
        return;
      }

      article.classList.add("visual-poem");

      const title = article.querySelector("h1");
      const titleText = title?.textContent?.trim() ?? "";

      if (titleText.length > 22) {
        article.classList.add("visual-poem-long-title");
      }

      const lang = chooseLanguage(article) ?? "en";
      article.setAttribute("data-poem-lang", lang);
      document.body.setAttribute("data-active-lang", lang);
      updateActiveLinks(article, lang);

      document.body.classList.add("has-visual-poem");
    });
  };

  const clearGenericLanguageSections = (article) => {
    article.querySelectorAll("[data-content-lang-section]").forEach((element) => {
      element.removeAttribute("data-content-lang-section");
      element.style.display = "";
    });
  };

  const markGenericLanguageSections = (article) => {
    clearGenericLanguageSections(article);

    const markdownRoot = article.querySelector(".markdown-preview-view") ?? article;
    const languageHeadings = [
      { lang: "original", element: getLanguageHeading(article, "original") },
      { lang: "en", element: getLanguageHeading(article, "en") },
      { lang: "nl", element: getLanguageHeading(article, "nl") },
    ].filter((entry) => entry.element && markdownRoot.contains(entry.element));

    languageHeadings.forEach((entry) => {
      let current = entry.element;

      while (current) {
        const isOtherH2 =
          current !== entry.element && current.tagName?.toLowerCase() === "h2";

        if (isOtherH2) break;

        current.setAttribute("data-content-lang-section", entry.lang);
        current = current.nextElementSibling;
      }
    });
  };

  const applyGenericLanguage = (article, lang, persist = false) => {
    if (!lang) return;

    article.classList.add("has-content-language");
    article.setAttribute("data-content-lang", lang);

    markGenericLanguageSections(article);

    article.querySelectorAll("[data-content-lang-section]").forEach((element) => {
      const sectionLang = element.getAttribute("data-content-lang-section");

      if (element.tagName?.toLowerCase() === "h2") {
        element.style.display = "none";
        return;
      }

      element.style.display = sectionLang === lang ? "" : "none";
    });

    updateActiveLinks(article, lang);

    if (persist) setStoredLanguage(lang);
  };

  const initGenericLanguagePages = () => {
    const articles = document.querySelectorAll("article");

    articles.forEach((article) => {
      if (article.classList.contains("visual-poem")) return;

      const hasLanguageToggle = article.querySelector(
        'a[href*="#english"], a[href*="#nederlands"], a[href*="#original"], a[href*="#lang-english"], a[href*="#lang-nederlands"], a[href*="#lang-original"]'
      );

      if (!hasLanguageToggle) return;

      const available = getAvailableLanguages(article);
      if (!available.length) return;

      applyGenericLanguage(article, chooseLanguage(article), false);
    });
  };

  const initLanguageToggles = () => {
    // Only visual poem pages are handled here.
    // Generic bilingual pages are handled by genericContentLanguageToggleScript below.
    initVisualPoems();
  };

  document.addEventListener(
    "click",
    (event) => {
      const target = event.target;

      if (!(target instanceof Element)) return;

      const link = target.closest("a");
      if (!link) return;

      const lang = getLanguageFromLink(link);
      if (!lang) return;

      const article = link.closest("article");
      if (!article) return;

      // Only visual poem pages are handled by this script.
      // Generic bilingual pages are handled by genericContentLanguageToggleScript below.
      if (!article.classList.contains("visual-poem")) return;

      const available = getAvailableLanguages(article);
      if (!available.includes(lang)) return;

      event.preventDefault();
      event.stopPropagation();

      article.setAttribute("data-poem-lang", lang);
      document.body.setAttribute("data-active-lang", lang);
      updateActiveLinks(article, lang);
      setStoredLanguage(lang);
      return;
    },
    true
  );

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initLanguageToggles);
  } else {
    initLanguageToggles();
  }

  window.addEventListener("load", initLanguageToggles);
  document.addEventListener("nav", initLanguageToggles);
})();

(() => {
  const STORAGE_KEY = "contentLanguage";

  const LANGUAGES = [
    { lang: "original", ids: ["original", "lang-original"], labels: ["original"] },
    { lang: "en", ids: ["english", "lang-english"], labels: ["english"] },
    { lang: "nl", ids: ["nederlands", "lang-nederlands"], labels: ["nederlands"] },
  ];

  const languageLinkSelector = LANGUAGES
    .flatMap((entry) => entry.ids.map((id) => 'a[href*="#' + id + '"]'))
    .join(", ");

  function getStoredLanguage() {
    try {
      return localStorage.getItem(STORAGE_KEY);
    } catch {
      return null;
    }
  }

  function setStoredLanguage(lang) {
    try {
      localStorage.setItem(STORAGE_KEY, lang);
    } catch {}
  }

  function getHashFromHref(href) {
    if (!href) return "";
    const index = href.indexOf("#");
    if (index === -1) return "";
    return href.slice(index + 1).toLowerCase();
  }

  function getLanguageFromId(id) {
    if (!id) return null;

    const normalized = id.toLowerCase();

    for (const entry of LANGUAGES) {
      if (entry.ids.includes(normalized)) {
        return entry.lang;
      }
    }

    return null;
  }

  function getLanguageFromLink(link) {
    const hash = getHashFromHref(link.getAttribute("href"));
    const text = (link.textContent || "").trim().toLowerCase();

    for (const entry of LANGUAGES) {
      if (entry.ids.includes(hash) || entry.labels.includes(text)) {
        return entry.lang;
      }
    }

    return null;
  }

  function getMarkdownRoot(article) {
    return article.querySelector(".markdown-preview-view") || article;
  }

  function getAvailableLanguages(article) {
    const root = getMarkdownRoot(article);
    const available = [];

    root.querySelectorAll("h2").forEach((heading) => {
      const lang = getLanguageFromId(heading.id);
      if (lang && !available.includes(lang)) {
        available.push(lang);
      }
    });

    return available;
  }

  function chooseLanguage(article) {
    const available = getAvailableLanguages(article);
    const stored = getStoredLanguage();

    if (stored && available.includes(stored)) return stored;
    if (available.includes("en")) return "en";
    if (available.includes("nl")) return "nl";
    if (available.includes("original")) return "original";

    return null;
  }

  function clearPreviousLanguageMarks(root) {
    root.querySelectorAll("[data-content-lang-section]").forEach((element) => {
      element.removeAttribute("data-content-lang-section");
      element.style.removeProperty("display");
    });
  }

  function markLanguageSections(article) {
    const root = getMarkdownRoot(article);
    clearPreviousLanguageMarks(root);

    let currentLang = null;

    Array.from(root.children).forEach((element) => {
      const tagName = element.tagName?.toLowerCase();

      if (tagName === "h2") {
        const headingLang = getLanguageFromId(element.id);

        if (headingLang) {
          currentLang = headingLang;
          element.setAttribute("data-content-lang-section", currentLang);
          return;
        }

        // A non-language ## heading starts shared content.
        currentLang = null;
        return;
      }

      if (currentLang) {
        element.setAttribute("data-content-lang-section", currentLang);
      }
    });
  }

  function updateActiveLinks(article, lang) {
    article.querySelectorAll(languageLinkSelector).forEach((link) => {
      const linkLang = getLanguageFromLink(link);
      if (!linkLang) return;

      link.classList.toggle("active", linkLang === lang);
    });
  }

  function applyLanguage(article, lang, persist = false) {
    if (!article || !lang) return;

    const root = getMarkdownRoot(article);

    article.classList.add("has-content-language");
    article.setAttribute("data-content-lang", lang);
    document.body.setAttribute("data-active-lang", lang);

    markLanguageSections(article);

    root.querySelectorAll("[data-content-lang-section]").forEach((element) => {
      const sectionLang = element.getAttribute("data-content-lang-section");
      const tagName = element.tagName?.toLowerCase();

      if (tagName === "h2") {
        element.style.setProperty("display", "none", "important");
        return;
      }

      element.style.setProperty(
        "display",
        sectionLang === lang ? "block" : "none",
        "important"
      );
    });

    updateActiveLinks(article, lang);

    if (persist) {
      setStoredLanguage(lang);
    }
  }

  function initGenericContentLanguageToggles() {
    document.querySelectorAll("article").forEach((article) => {
      // Critical: poem pages keep their old working system.
      if (article.classList.contains("visual-poem")) return;

      const hasLanguageToggle = article.querySelector(languageLinkSelector);
      if (!hasLanguageToggle) return;

      const available = getAvailableLanguages(article);
      if (!available.length) return;

      const lang = chooseLanguage(article);
      applyLanguage(article, lang, false);
    });
  }

  document.addEventListener(
    "click",
    (event) => {
      const target = event.target;
      if (!(target instanceof Element)) return;

      const link = target.closest(languageLinkSelector);
      if (!link) return;

      const article = link.closest("article");
      if (!article) return;

      // Critical: poem pages are handled by poemLanguageToggleScript.
      if (article.classList.contains("visual-poem")) return;

      const lang = getLanguageFromLink(link);
      if (!lang) return;

      const available = getAvailableLanguages(article);
      if (!available.includes(lang)) return;

      event.preventDefault();
      event.stopPropagation();

      applyLanguage(article, lang, true);
    },
    true
  );

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initGenericContentLanguageToggles);
  } else {
    initGenericContentLanguageToggles();
  }

  window.addEventListener("load", initGenericContentLanguageToggles);
  document.addEventListener("nav", initGenericContentLanguageToggles);
})();
