<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 64" width="40" height="64" fill="none">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="40" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b4c24"/>
      <stop offset="0.35" stop-color="#b98245"/>
      <stop offset="0.7" stop-color="#8b5528"/>
      <stop offset="1" stop-color="#d0a066"/>
    </linearGradient>

    <linearGradient id="paper" x1="8" y1="44" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e2b977"/>
      <stop offset="0.45" stop-color="#f8e5b6"/>
      <stop offset="1" stop-color="#c88e45"/>
    </linearGradient>

    <radialGradient id="highlight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(13 24) rotate(35) scale(15 28)">
      <stop offset="0" stop-color="#f4c889" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#f4c889" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGrain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="9" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.45
        0 0 0 0 0.29
        0 0 0 0 0.12
        0 0 0 0.12 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
  </defs>

  <ellipse cx="20" cy="36" rx="3.3" ry="22" fill="#4d2f18" opacity="0.12"/>

  <g filter="url(#softGrain)">
    <path d="M20 4C25.3 4 28.8 9.2 28.8 15.2V18.8C28.8 22.5 24.8 25.5 20 25.5C15.2 25.5 11.2 22.5 11.2 18.8V15.2C11.2 9.2 14.7 4 20 4Z" fill="url(#wood)"/>
    <rect x="10.5" y="18" width="19" height="11" rx="5.5" fill="#9b642f"/>
    <rect x="7.8" y="25" width="24.4" height="8.2" rx="4.1" fill="url(#wood)"/>
    <rect x="5.8" y="31" width="28.4" height="9" rx="4.5" fill="#b47a3a"/>
    <rect x="7.4" y="38" width="25.2" height="7.2" rx="3.6" fill="#8b5528"/>
    <rect x="8.5" y="43" width="23" height="18" rx="5.5" fill="url(#paper)"/>
  </g>

  <rect x="10.2" y="44.8" width="19.6" height="13.8" rx="4.8" fill="#fff3cc" opacity="0.28"/>
  <path d="M13.5 13C11.8 18 12 23 13.2 29" stroke="url(#highlight)" stroke-width="2.2" stroke-linecap="round" opacity="0.5"/>
