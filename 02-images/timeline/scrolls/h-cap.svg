  </defs>

  <ellipse cx="35" cy="34" rx="23" ry="3.2" fill="#4d2f18" opacity="0.14"/>

  <g filter="url(#softGrain)">
    <path d="M4 20C4 14.7 9.2 11.2 15.2 11.2H18.8C22.5 11.2 25.5 15.2 25.5 20C25.5 24.8 22.5 28.8 18.8 28.8H15.2C9.2 28.8 4 25.3 4 20Z" fill="url(#wood)"/>
    <rect x="18" y="10.5" width="11" height="19" rx="5.5" fill="#9b642f"/>
    <rect x="25" y="7.8" width="8.2" height="24.4" rx="4.1" fill="url(#wood)"/>
    <rect x="31" y="5.8" width="9" height="28.4" rx="4.5" fill="#b47a3a"/>
    <rect x="38" y="7.4" width="7.2" height="25.2" rx="3.6" fill="#8b5528"/>
