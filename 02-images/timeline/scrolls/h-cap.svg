<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" width="64" height="40" fill="none">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="64" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b4c24"/>
      <stop offset="0.35" stop-color="#b98245"/>
      <stop offset="0.7" stop-color="#8b5528"/>
      <stop offset="1" stop-color="#d0a066"/>
    </linearGradient>

    <linearGradient id="paper" x1="44" y1="8" x2="64" y2="32" gradientUnits="userSpaceOnUse">
