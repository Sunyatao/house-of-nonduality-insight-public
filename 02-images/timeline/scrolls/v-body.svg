<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 240" width="40" height="240" fill="none" preserveAspectRatio="none">
  <defs>
    <linearGradient id="paperBase" x1="0" y1="0" x2="40" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b97834"/>
      <stop offset="0.18" stop-color="#e2bd77"/>
      <stop offset="0.52" stop-color="#fff0bf"/>
      <stop offset="0.84" stop-color="#e8c887"/>
      <stop offset="1" stop-color="#c89046"/>
