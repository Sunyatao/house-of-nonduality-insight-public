    <linearGradient id="centerLight" x1="0" y1="0" x2="0" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1d79a" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#fff6d3" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#e0b96e" stop-opacity="0.35"/>
