             C130 34.6 107 32.4 78 33.2
             C48 34.1 23 31.8 0 33
             Z"
          fill="url(#paperBase)"/>

    <path d="M0 10
             C44 9 86 10.4 126 9.5
             C166 8.7 204 10.3 240 9.2
             L240 30.2
             C198 30.9 158 29.8 121 30.8
             C78 31.9 42 30.2 0 31.3
             Z"
          fill="url(#centerLight)" opacity="0.9"/>
  </g>

  <path d="M0 8.4C55 6.5 110 8.5 160 7.2C194 6.3 218 8.1 240 7.3" stroke="#a8682d" stroke-opacity="0.22" stroke-width="1"/>
  <path d="M0 32.6C58 34.3 101 31.6 150 33.1C188 34.2 215 32.1 240 32.7" stroke="#8b5528" stroke-opacity="0.18" stroke-width="1"/>
