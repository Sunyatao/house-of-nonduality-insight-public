<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" width="240" height="40" fill="none" preserveAspectRatio="none">
  <defs>
    <linearGradient id="paperBase" x1="0" y1="0" x2="0" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c89046"/>
      <stop offset="0.16" stop-color="#e8c887"/>
      <stop offset="0.48" stop-color="#fff0bf"/>
      <stop offset="0.82" stop-color="#e2bd77"/>
      <stop offset="1" stop-color="#b97834"/>
    </linearGradient>

    <linearGradient id="centerLight" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f1d79a" stop-opacity="0.38"/>
      <stop offset="0.45" stop-color="#fff6d3" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#e0b96e" stop-opacity="0.35"/>
    </linearGradient>

    <filter id="paperGrain" x="-5%" y="-30%" width="110%" height="160%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="3" seed="12" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.50
        0 0 0 0 0.34
        0 0 0 0 0.15
        0 0 0 0.10 0" result="grain"/>
      <feBlend in="SourceGraphic" in2="grain" mode="multiply"/>
    </filter>
  </defs>

  <g filter="url(#paperGrain)">
    <path d="M0 8
             C20 6.8 36 8.7 58 7.4
             C84 5.8 108 8.2 135 7.2
             C165 6.1 192 8.4 240 7.2
             L240 32.5
